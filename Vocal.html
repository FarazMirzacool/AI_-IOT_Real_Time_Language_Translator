<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Voice Translation Assistant</title>
    <link rel="stylesheet" href="vocal.css">
</head>
<body>

<div class="assistant-card">
    <div class="hero">
        <h1>
            🎙️ VocalX
            <span>AI voice translator</span>
        </h1>
        <p>Speak naturally → select target language → hear translated speech instantly</p>
    </div>

    <div class="dashboard">
        <!-- LEFT: Source (Voice + Text) -->
        <div class="panel">
            <div class="panel-title">
                🎤 Step 1 · Capture your voice
                <span class="status-badge" id="micStatusBadge">⚪ Inactive</span>
            </div>
            
            <div class="source-lang-selector">
                <label>📝 Source language:</label>
                <select id="sourceLangSelect" class="lang-select" style="background:#f8fafc;">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ja">Japanese</option>
                    <option value="zh">Chinese</option>
                    <option value="hi">Hindi</option>
                    <option value="ar">Arabic</option>
                    <option value="ru">Russian</option>
                </select>
            </div>
            
            <textarea id="sourceText" class="text-area" rows="4" placeholder="Your spoken text will appear here ... or type manually"></textarea>
            <div class="controls">
                <div class="mic-indicator">
                    <div class="pulse-dot" id="micLed"></div>
                    <span id="micStateText" style="font-size:0.8rem;">Microphone idle</span>
                </div>
                <div class="action-group">
                    <button id="startRecordBtn" class="btn btn-primary">🎙️ Start listening</button>
                    <button id="stopRecordBtn" class="btn btn-outline" disabled>⏹️ Stop</button>
                </div>
            </div>
            <div class="action-group" style="margin-top: 6px;">
                <button id="clearSourceBtn" class="btn btn-outline" style="font-size:0.8rem;">🗑️ Clear text</button>
                <span style="font-size:0.7rem; color:#4b5563;">💡 Speak clearly, then click "Translate & Speak"</span>
            </div>
        </div>

        <!-- RIGHT: Translation + Target Language & Speech Output -->
        <div class="panel">
            <div class="panel-title">
                🌍 Step 2 · Translate & speak
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;">
                <label style="font-weight: 500;">Translate to:</label>
                <select id="targetLangSelect" class="lang-select">
                    <option value="es">🇪🇸 Spanish</option>
                    <option value="fr">🇫🇷 French</option>
                    <option value="de">🇩🇪 German</option>
                    <option value="it">🇮🇹 Italian</option>
                    <option value="pt">🇵🇹 Portuguese</option>
                    <option value="ja">🇯🇵 Japanese</option>
                    <option value="zh-CN">🇨🇳 Chinese</option>
                    <option value="hi">🇮🇳 Hindi</option>
                    <option value="ar">🇸🇦 Arabic</option>
                    <option value="en">🇬🇧 English</option>
                    <option value="ru">🇷🇺 Russian</option>
                </select>
            </div>
            <textarea id="translatedText" class="text-area" rows="4" placeholder="Translation will appear here ..." readonly style="background:#fafcff;"></textarea>
            <div class="controls" style="justify-content: space-between; margin-top: 18px;">
                <button id="translateAndSpeakBtn" class="btn btn-primary">🔊 Translate & Speak</button>
                <button id="stopSpeakingBtn" class="btn btn-outline">⏹️ Stop speech</button>
            </div>
            <div style="margin-top: 14px;">
                <button id="copyTranslationBtn" class="btn btn-outline" style="width: 100%;">📋 Copy translation</button>
            </div>
            <hr>
            <div class="status-badge" id="translationStatus" style="background:#e6f7e6;">✨ Ready</div>
        </div>
    </div>
    <div class="footer-note">
        🔒 Microphone access required
    </div>
</div>
<script src="vocal.js"></script>
</body>
</html>
